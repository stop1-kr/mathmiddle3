        .answer-btn:active { background: #ff2e4c; transform: scale(0.95); }

        .ctrl-btn:active, .ctrl-btn.active { background: rgba(255,255,255,0.5); }
        #jump-btn { width: 100px; height: 100px; border-radius: 50%; background: #e94560; border: 4px solid #ff2e4c; font-weight: bold; font-size: 22px; cursor: pointer; }
        
        #gauge-container { position: absolute; bottom: 120px; right: 20px; width: 25px; height: 160px; background: rgba(0,0,0,0.5); border: 2px solid white; border-radius: 12px; overflow: hidden; display: none; }
        #gauge-fill { width: 100%; height: 0%; background: linear-gradient(to top, #00ff00, #ff0000); position: absolute; bottom: 0; }
    </style>

<body>

<script>
/** ==========================================
 *  1. 게임 코어 및 치트 시스템 (순환)
 *  ========================================== */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const gaugeContainer = document.getElementById('gauge-container');
const gaugeFill = document.getElementById('gauge-fill');

let gameWidth, gameHeight;
function resize() {
    gameWidth = canvas.parentElement.clientWidth;
    gameHeight = canvas.parentElement.clientHeight;
    canvas.width = gameWidth;
    canvas.height = gameHeight;
}
window.addEventListener('resize', resize);
resize();

let cameraY = 0;
let jumpChances = 0;
let keys = { left: false, right: false, jump: false };
let jumpChargeTime = 0;
let isCharging = false;
let globalWind = { force: 0, direction: 1, timer: 0 };
let fireworks = [];
let gameWon = false;

// 치트 모드: 0=기본, 1=무한점프(🎂), 2=점검모드(🍬)
let cheatState = 0;
let cheatClicks = 0;
document.getElementById('cheat-icon').addEventListener('touchstart', handleCheatClick);
document.getElementById('cheat-icon').addEventListener('click', handleCheatClick);

function handleCheatClick(e) {
    e.preventDefault();
    cheatClicks++;
    if (cheatClicks >= 5) {
        cheatState = (cheatState + 1) % 3; // 0, 1, 2 순환
        cheatClicks = 0;
        
        const icons = ['🍩', '🎂', '🍬'];
        document.getElementById('cheat-icon').innerText = icons[cheatState];
        
        if (cheatState === 0) jumpChances = 0;
        else if (cheatState === 1) jumpChances = '∞';
        else if (cheatState === 2) jumpChances = '점검';
        
        updateUI();
    }
}

/** ==========================================
 *  2. 플레이어 객체
 *  ========================================== */
const player = {
    x: gameWidth / 2, y: 0, width: 34, height: 56,
    vx: 0, vy: 0, speed: 4.5, gravity: 0.45,
    onGround: false, isJumping: false, faceRight: true,
    walkTick: 0,
    
    update() {
        // [점검 모드 물리 법칙]
        if (cheatState === 2) {
            this.walkTick = 0;
            // 공중에서도 자유 좌우 이동
            if (keys.left) { this.vx = -this.speed; this.faceRight = false; }
            else if (keys.right) { this.vx = this.speed; this.faceRight = true; }
            else { this.vx = 0; }

            // 비행 (점프 누르면 상승, 떼면 천천히 하강)
            if (keys.jump) {
                this.vy = -6; 
                this.isJumping = true;
                this.onGround = false;
            } else {
                this.vy += 0.2; // 수중처럼 천천히 떨어짐
                if (this.vy > 3.5) this.vy = 3.5;
            }

            this.x += this.vx;
            this.y += this.vy;
            
            if (this.x < 0) { this.x = 0; this.vx = 0; }
            if (this.x + this.width > gameWidth) { this.x = gameWidth - this.width; this.vx = 0; }
        } 
        // [기본 모드 물리 법칙]
        else {
            if (this.onGround && !isCharging) {
                if (keys.left) { this.vx = -this.speed; this.faceRight = false; this.walkTick += 0.2; }
                else if (keys.right) { this.vx = this.speed; this.faceRight = true; this.walkTick += 0.2; }
                else { this.vx = 0; this.walkTick = 0; }
            } else {
                this.walkTick = 0;
            }

            // 바람 영향
            if (!this.onGround && this.y < -500 && this.y > -2000) {
                this.vx += globalWind.force * globalWind.direction; 
            }

            this.vy += this.gravity;
            this.x += this.vx;
            this.y += this.vy;

            // 벽 충돌 튕기기
            if (this.x < 0) { this.x = 0; this.vx = Math.abs(this.vx) * 0.8; }
            if (this.x + this.width > gameWidth) { this.x = gameWidth - this.width; this.vx = -Math.abs(this.vx) * 0.8; }
        }
    },

    draw() {
        ctx.save();
        ctx.translate(this.x + this.width/2, this.y - cameraY + this.height/2);
        if (!this.faceRight) ctx.scale(-1, 1);
        
        let legOffset = Math.sin(this.walkTick) * 6;
        ctx.fillStyle = "#362A25"; 
        ctx.beginPath(); ctx.roundRect(-10, 16 - legOffset, 8, 12, 2); ctx.fill(); 
        ctx.beginPath(); ctx.roundRect(2, 16 + legOffset, 8, 12, 2); ctx.fill(); 

        ctx.fillStyle = "#D4C4A8";
        ctx.beginPath(); ctx.roundRect(-14, -8, 28, 26, 4); ctx.fill();
        ctx.fillStyle = "#B0D0E8";
        ctx.beginPath(); ctx.moveTo(-6, -8); ctx.lineTo(6, -8); ctx.lineTo(0, 5); ctx.fill();
        ctx.fillStyle = "#2E5C3A";
        ctx.beginPath(); ctx.moveTo(-2, -5); ctx.lineTo(2, -5); ctx.lineTo(3, 3); ctx.lineTo(0, 6); ctx.lineTo(-3, 3); ctx.fill();

        ctx.strokeStyle = "#3B2A25";
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(-10, -8); ctx.lineTo(0, 10); ctx.lineTo(10, -8); ctx.stroke();
        
        ctx.fillStyle = "#3B2A25";
        ctx.fillRect(-12, 10, 6, 2); 
        ctx.fillRect(6, 10, 6, 2); 
        ctx.beginPath(); ctx.arc(0, 12, 1.5, 0, Math.PI*2); ctx.fill(); 

        ctx.fillStyle = "#ffccaa"; 
        ctx.beginPath(); ctx.arc(0, -18, 11, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#111"; 
        ctx.beginPath(); ctx.arc(0, -20, 12, Math.PI, Math.PI*2); ctx.fill(); 
        ctx.beginPath(); ctx.arc(-4, -22, 6, 0, Math.PI*2); ctx.fill(); 
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(3, -17, 1.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(7, -17, 1.5, 0, Math.PI*2); ctx.fill();

        ctx.restore();
    },

    jump(powerRatio) {
        if (!this.onGround || cheatState === 2) return;
        let jumpPower = 13 + (11 * powerRatio);
        this.vy = -jumpPower;
        this.onGround = false;
        this.isJumping = true;
        
        if (keys.left) this.vx = -this.speed * (1 + powerRatio * 1.2);
        else if (keys.right) this.vx = this.speed * (1 + powerRatio * 1.2);
        else this.vx = 0;

        if (cheatState === 0) {
            jumpChances--;
            updateUI();
        }
    },

    penaltyJump() {
        this.vy = -22;
        this.vx = (Math.random() - 0.5) * 18;
        this.onGround = false;
        this.isJumping = true;
    }
};

/** ==========================================
 *  3. 맵 및 충돌
 *  ========================================== */
const platforms = [];

function generateMap() {
    let currentY = gameHeight - 150;
    platforms.push({ x: 0, y: gameHeight - 20, w: gameWidth, h: 40, type: 'normal' });
    player.y = gameHeight - 20 - player.height; 

    for (let i = 0; i < 60; i++) {
        let w = 70 + Math.random() * 110;
        let x = Math.random() * (gameWidth - w);
        let type = 'normal';
        
        if (i === 15 || i === 30 || i === 45) type = 'red';
        if (i > 40 && type !== 'red') type = 'snow';

        platforms.push({ x, y: currentY, w, h: 25, type: type });
        currentY -= 110 + Math.random() * 60; 
    }
    platforms.push({ x: gameWidth/2 - 45, y: currentY, w: 90, h: 25, type: 'goal' });
}
generateMap();

function checkCollisions() {
    let wasOnGround = player.onGround;
    player.onGround = false;

    for (let p of platforms) {
        if (player.vy < 0 && 
            player.y > p.y + p.h && player.y + player.vy <= p.y + p.h &&
            player.x + player.width > p.x && player.x < p.x + p.w) {
            
            player.y = p.y + p.h;
            player.vy = 0;
            if (cheatState !== 2) player.vx = 0; 
        }
        else {
            let prevBottom = player.y - player.vy + player.height;
            let currentBottom = player.y + player.height;
            
            if (player.vy > 0 && prevBottom <= p.y + 0.1 && currentBottom >= p.y &&
                player.x + player.width > p.x && player.x < p.x + p.w) {
                
                player.y = p.y - player.height; 
                player.vy = 0;
                if (cheatState !== 2) player.vx = 0;
                player.onGround = true;
                player.isJumping = false;
                
                // 점검 모드가 아닐 때만 빨간 블록 이벤트 발동
                if (p.type === 'red' && !wasOnGround && cheatState !== 2) {
                    triggerRedBlockEvent();
                }
                if (p.type === 'goal' && !gameWon) {
                    gameWon = true;
                    triggerFireworks();
                }
            }
        }
    }

    if (player.onGround && !wasOnGround) {
        if (jumpChances === 0 && cheatState === 0) {
            generateProblem();
        }
    }
}

/** ==========================================
 *  4. 그리기 로직 (루프)
 *  ========================================== */
setInterval(() => {
    globalWind.direction = Math.random() > 0.5 ? 1 : -1;
    globalWind.force = 0.08 + Math.random() * 0.12; 
}, 4500);

let lastTime = 0;
function update(time) {
    let dt = time - lastTime;
    lastTime = time;

    player.update();
    checkCollisions();

    // 점프 게이지는 점검 모드(2)에서는 보이지 않음
    if (isCharging && player.onGround && cheatState !== 2 && (jumpChances > 0 || cheatState === 1)) {
        jumpChargeTime += dt;
        if (jumpChargeTime > 1000) jumpChargeTime = 1000;
        gaugeContainer.style.display = 'block';
        gaugeFill.style.height = (jumpChargeTime / 10) + '%';
    } else {
        gaugeContainer.style.display = 'none';
    }

    let targetCameraY = player.y - gameHeight * 0.45;
    if (targetCameraY < cameraY) cameraY += (targetCameraY - cameraY) * 0.15; 
    if (player.y > cameraY + gameHeight * 0.8) cameraY = player.y - gameHeight * 0.8;

    // 1. 성벽 패럴랙스 배경
    ctx.fillStyle = '#111424'; 
    ctx.fillRect(0, 0, gameWidth, gameHeight);
    
    ctx.fillStyle = '#181d33';
    for(let i=0; i<gameWidth/120; i++) {
        ctx.fillRect(i*160 + 20, 0, 80, gameHeight);
    }
    ctx.strokeStyle = '#0a0d17';
    ctx.lineWidth = 2;
    let bgOffsetY = cameraY * 0.3; 
    for(let y = -(bgOffsetY % 60) - 60; y < gameHeight; y += 60) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(gameWidth, y); ctx.stroke();
        for(let x = 0; x < gameWidth; x += 80) {
            let shift = (Math.floor(y/60)%2)*40;
            ctx.beginPath(); ctx.moveTo(x + shift, y); ctx.lineTo(x + shift, y+60); ctx.stroke();
        }
    }

    // 2. 바람 이펙트 구역 (카메라가 비출 때 무조건 항상 렌더링되게 수정)
    let windTop = -2000 - cameraY;
    let windBottom = -500 - cameraY;
    
    if (windTop < gameHeight && windBottom > 0) {
        // 바람 구역 오버레이 배경 표시
        ctx.fillStyle = "rgba(100, 150, 255, 0.05)";
        ctx.fillRect(0, windTop, gameWidth, 1500);

        // 바람 실선 이펙트
        ctx.strokeStyle = "rgba(255, 255, 255, 0.25)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        for(let i=0; i<15; i++) {
            let wx = (Date.now() / 4 * globalWind.direction + i * 50) % gameWidth;
            if (wx < 0) wx += gameWidth;
            let wy = (Math.sin(Date.now() / 400 + i) * 30) + (i * (1500/15)) + windTop;
            ctx.moveTo(wx, wy); ctx.lineTo(wx + 60 * globalWind.direction, wy);
        }
        ctx.stroke();
    }

    // 3. 발판 그리기
    platforms.forEach(p => {
        let drawY = p.y - cameraY;
        if (drawY < -50 || drawY > gameHeight + 50) return;

        ctx.fillStyle = '#222831';
        ctx.fillRect(p.x, drawY + 8, p.w, p.h - 8);

        if (p.type === 'normal') {
            ctx.fillStyle = '#76B947'; 
            ctx.fillRect(p.x, drawY, p.w, 8);
            ctx.fillStyle = '#558732'; 
            ctx.fillRect(p.x, drawY+8, p.w, 3);
        } else if (p.type === 'red') {
            ctx.fillStyle = '#ff2e4c';
            ctx.fillRect(p.x, drawY, p.w, p.h);
            ctx.fillStyle = '#ffb3ba'; 
            ctx.fillRect(p.x, drawY, p.w, 6);
        } else if (p.type === 'snow') {
            ctx.fillStyle = '#4a5d86';
            ctx.fillRect(p.x, drawY + 6, p.w, p.h - 6);
            ctx.fillStyle = '#ffffff'; 
            ctx.fillRect(p.x, drawY, p.w, 8);
        } else if (p.type === 'goal') {
            ctx.shadowBlur = 20; ctx.shadowColor = "#ffcc00";
            ctx.fillStyle = '#4b382a';
            ctx.beginPath(); ctx.arc(p.x + p.w/2, drawY, 20, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.fillRect(p.x + p.w/2 - 10, drawY - 2, 20, 5);
            ctx.shadowBlur = 0;
        }
    });

    player.draw();
    drawFireworks();

    let currentHeightM = Math.floor(Math.max(0, (gameHeight - 20 - player.y) / 50));
    let targetHeightM = Math.floor((gameHeight - 20 - platforms[platforms.length-1].y) / 50);
    document.getElementById('current-h').innerText = currentHeightM;
    document.getElementById('target-h').innerText = targetHeightM;

    requestAnimationFrame(update);
}

/** ==========================================
 *  5. 조작부 이벤트
 *  ========================================== */
function setupControls() {
    const bindTouch = (id, key) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; el.classList.add('active'); });
        el.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; el.classList.remove('active'); });
        // PC 테스트용 이벤트
        el.addEventListener('mousedown', () => { keys[key] = true; el.classList.add('active'); });
        el.addEventListener('mouseup', () => { keys[key] = false; el.classList.remove('active'); });
        el.addEventListener('mouseleave', () => { keys[key] = false; el.classList.remove('active'); });
    };
    bindTouch('btn-left', 'left');
    bindTouch('btn-right', 'right');

    const jumpBtn = document.getElementById('jump-btn');
    const startJump = (e) => {
        if(e) e.preventDefault();
        keys.jump = true; // 점검(비행) 모드 상승용 트리거
        if (cheatState === 2) return;

        if (player.onGround && !isCharging && (jumpChances > 0 || cheatState === 1)) {
            isCharging = true;
            jumpChargeTime = 0;
            jumpBtn.style.transform = 'scale(0.9)';
        }
    };
    const endJump = (e) => {
        if(e) e.preventDefault();
        keys.jump = false; // 점검(비행) 모드 하강 전환
        if (cheatState === 2) return;

        if (isCharging) {
            isCharging = false;
            jumpBtn.style.transform = 'scale(1)';
            player.jump(jumpChargeTime / 1000);
            jumpChargeTime = 0;
        }
    };
    
    jumpBtn.addEventListener('touchstart', startJump);
    jumpBtn.addEventListener('touchend', endJump);
    jumpBtn.addEventListener('mousedown', startJump);
    jumpBtn.addEventListener('mouseup', endJump);
    jumpBtn.addEventListener('mouseleave', endJump);

    window.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowLeft') keys.left = true;
        if (e.code === 'ArrowRight') keys.right = true;
        if (e.code === 'Space' && !e.repeat) startJump();
    });
    window.addEventListener('keyup', (e) => {
        if (e.code === 'ArrowLeft') keys.left = false;
        if (e.code === 'ArrowRight') keys.right = false;
        if (e.code === 'Space') endJump();
    });
}
setupControls();

/** ==========================================
 *  6. 문제 생성 및 로직
 *  ========================================== */
let currentCorrectIndex = -1;
let problemData = {};

function generateProblem() {
    if (cheatState !== 0 || jumpChances > 0) return; 

    const btns = document.querySelectorAll('.answer-btn');
    btns.forEach(btn => btn.disabled = false);

    let type = Math.floor(Math.random() * 3);
    let qText = "";
    let answers = [];
    let correctAns = "";

    const pythagorean = [
        {a: 3, b: 4, c: 5}, {a: 5, b: 12, c: 13}, {a: 8, b: 15, c: 17}, {a: 6, b: 8, c: 10}
    ];

    if (type === 0) {
        let tri = pythagorean[Math.floor(Math.random() * pythagorean.length)];
        let isSin = Math.random() > 0.5;
        let funcName = isSin ? "sin A" : "cos A";
        qText = `오른쪽 직각삼각형에서 ${funcName}의 값은?`;
        correctAns = isSin ? `${tri.a}/${tri.c}` : `${tri.b}/${tri.c}`;
        answers = [correctAns, `${tri.b}/${tri.c}`, `${tri.a}/${tri.b}`, `${tri.c}/${tri.a}`];
        problemData = { a: tri.a, b: tri.b, c: tri.c, angleA: "A", angleB: "B" };
    } 
    else if (type === 1) {
        const specialAngles = [
            { angle: 30, sin: "1/2", cos: "√3/2", tan: "√3/3" },
            { angle: 45, sin: "√2/2", cos: "√2/2", tan: "1" },
            { angle: 60, sin: "√3/2", cos: "1/2", tan: "√3" }
        ];
        let sa = specialAngles[Math.floor(Math.random() * specialAngles.length)];
        let funcs = ['sin', 'cos', 'tan'];
        let choice = funcs[Math.floor(Math.random() * funcs.length)];
        qText = `${choice} ${sa.angle}° 의 값은?`;
        correctAns = sa[choice];
        answers = ["1/2", "√2/2", "√3/2", "1", "√3", "√3/3"];
        problemData = null; 
    }
    else {
        let angles = [30, 45, 60];
        let ang = angles[Math.floor(Math.random() * angles.length)];
        let hypotenuse = (Math.floor(Math.random() * 5) + 2) * 2; 
        
        qText = `∠B = 90°, ∠A = ${ang}° 이고 빗변이 ${hypotenuse}일 때, 높이(a)는?`;
        if (ang === 30) correctAns = String(hypotenuse / 2);
        if (ang === 45) correctAns = `${hypotenuse/2}√2`;
        if (ang === 60) correctAns = `${hypotenuse/2}√3`;
        
        answers = [correctAns, String(hypotenuse), `${hypotenuse/2}√3`, `${hypotenuse/2}√2`, String(hypotenuse/2)];
        problemData = { angle: ang, hyp: hypotenuse };
    }

    document.getElementById('question-text').innerText = qText;
    
    answers = [...new Set(answers)];
    let finalAnswers = [correctAns];
    while(finalAnswers.length < 3) {
        let rand = answers[Math.floor(Math.random() * answers.length)];
        if(!finalAnswers.includes(rand)) finalAnswers.push(rand);
    }
    finalAnswers.sort(() => Math.random() - 0.5);
    currentCorrectIndex = finalAnswers.indexOf(correctAns);

    for(let i=0; i<3; i++) btns[i].innerText = finalAnswers[i];

    drawTriangleBox(problemData);
}

function checkAnswer(index) {
    if (cheatState !== 0 || jumpChances > 0) return; 
    
    const btns = document.querySelectorAll('.answer-btn');
    btns.forEach(btn => btn.disabled = true); 

    if (index === currentCorrectIndex) {
        jumpChances = 5;
        updateUI();
        document.getElementById('question-text').innerText = "정답입니다! 점프 기회 5회를 얻었습니다.";
    } else {
        document.getElementById('question-text').innerText = "오답입니다! 벌칙으로 강제 점프합니다!";
        player.penaltyJump();
    }
}

function drawTriangleBox(data) {
    const tCanvas = document.getElementById('triangle-canvas');
    const tCtx = tCanvas.getContext('2d');
    tCtx.clearRect(0, 0, tCanvas.width, tCanvas.height);

    if (!data) return;

    tCtx.strokeStyle = "black";
    tCtx.lineWidth = 2;
    tCtx.fillStyle = "black";
    tCtx.font = "16px Pretendard";

    let w = tCanvas.width;
    let h = tCanvas.height;
    
    let a, b;
    if (data.angle) {
        let rad = data.angle * Math.PI / 180;
        b = 100; 
        a = b * Math.tan(rad);
    } else {
        b = data.b * 10;
        a = data.a * 10;
    }

    let scale = Math.min((w-60)/b, (h-40)/a);
    let drawW = b * scale;
    let drawH = a * scale;
    let offsetX = (w - drawW) / 2;
    let offsetY = h - (h - drawH) / 2 - 10;

    tCtx.beginPath();
    tCtx.moveTo(offsetX, offsetY); 
    tCtx.lineTo(offsetX + drawW, offsetY); 
    tCtx.lineTo(offsetX, offsetY - drawH); 
    tCtx.closePath();
    tCtx.stroke();
    tCtx.strokeRect(offsetX, offsetY - 10, 10, 10);

    if (data.a && data.b) {
        tCtx.fillText(`c=${data.c}`, offsetX + drawW/2 + 10, offsetY - drawH/2);
        tCtx.fillText(`a=${data.a}`, offsetX - 35, offsetY - drawH/2);
        tCtx.fillText(`b=${data.b}`, offsetX + drawW/2 - 10, offsetY + 20);
        tCtx.fillText("A", offsetX + drawW + 5, offsetY + 5);
        tCtx.fillText("B", offsetX - 15, offsetY + 5);
    } else if (data.angle) {
        tCtx.fillText(`${data.angle}°`, offsetX + drawW - 35, offsetY - 5);
        tCtx.fillText(data.hyp, offsetX + drawW/2 + 10, offsetY - drawH/2);
        tCtx.fillText("a = ?", offsetX - 45, offsetY - drawH/2);
    }
}

function updateUI() {
    document.getElementById('chance-count').innerText = jumpChances;
    const jumpBtn = document.getElementById('jump-btn');
    if (cheatState === 0 && jumpChances <= 0) {
        jumpBtn.style.background = '#555';
        jumpBtn.style.borderColor = '#333';
    } else {
        jumpBtn.style.background = '#e94560';
        jumpBtn.style.borderColor = '#ff2e4c';
    }
}

/** ==========================================
 *  7. 특수 이벤트 처리
 *  ========================================== */
function triggerRedBlockEvent() {
    const overlay = document.getElementById('warning-overlay');
    overlay.style.display = 'flex';
    keys = { left: false, right: false, jump: false };
    if(cheatState === 0) jumpChances = 0;
    
    setTimeout(() => {
        overlay.style.display = 'none';
        if(cheatState === 0) generateProblem();
        
        let timer = setTimeout(() => {
            if(jumpChances === 0 && cheatState === 0 && player.onGround) {
                document.getElementById('question-text').innerText = "시간 초과! 강제 점프합니다!";
                player.penaltyJump();
            }
        }, 10000);
    }, 2000);
}

function triggerFireworks() {
    for(let i=0; i<60; i++) {
        fireworks.push({
            x: gameWidth/2, y: cameraY - 100, 
            vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.5) * 12,
            color: `hsl(${Math.random()*360}, 100%, 60%)`, life: 1.0
        });
    }
}

function drawFireworks() {
    for(let i=fireworks.length-1; i>=0; i--) {
        let f = fireworks[i];
        f.x += f.vx; f.y += f.vy; f.life -= 0.015;
        ctx.fillStyle = f.color;
        ctx.globalAlpha = Math.max(0, f.life);
        ctx.beginPath(); ctx.arc(f.x, f.y - cameraY, 5, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1.0;
        if(f.life <= 0) fireworks.splice(i, 1);
    }
    if (gameWon) {
        ctx.fillStyle = "white";
        ctx.font = "bold 40px Pretendard";
        ctx.textAlign = "center";
        ctx.fillText("🎉 축하합니다! 꼭대기 도달! 🎉", gameWidth/2, gameHeight/2 - 50);
        ctx.textAlign = "left";
    }
}

updateUI();
generateProblem();
requestAnimationFrame(update);

</script>
